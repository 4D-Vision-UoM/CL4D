# P4Transformer Training Configuration

# Experiment metadata
experiment:
  name: "P4Transformer"
  description: "P4Transformer pipeline training"
  tags: ["4d", "motion_text_alignment", "p4transformer", "contrastive"]

# Model configuration
model:
  # Pipeline module and its initialization arguments
  pipeline_module: "src.models.pipelines.p4transformer_module.models.P4Transformer"
  pipeline_class: "P4Transformer"
  
  pipeline_args:
    # P4 Transformer specific parameters
    radius: 0.7
    nsamples: 32
    spatial_stride: 32
    temporal_kernel_size: 3
    temporal_stride: 2
    emb_relu: false
    dim: 1024
    heads: 8
    mlp_dim: 2048  # Text embedding dimension for projection layer
    dim_head: 128
    depth: 5
    head_type: "simclr"  # Options: "linear", "simclr", "original"
    projection_dim: 256
    
    # Device
    device: "cuda"
  
  
  # Text encoder configuration (handled in training code)
  text_encoder_config:
    text_encoder_type: "distilbert"
    text_model_name: "distilbert-base-uncased"
    freeze_text_encoder: false
    text_embedding_dims: 768
    projection_dims: 256
    dropout: 0.5

# Data configuration
data:
# Dataset module and class
  dataset_module: "src.datasets.DynAction4D_Human"
  dataset_class: "DynAction4DHuman"
  collate_fn: "collate_fn"  # Name of collate function in the dataset module

  data_root: "data/DynAction4D_Human"
  train_split: "train"
  val_split: "val"
  num_frames: 16  ### must match num_frames in model config
  num_points: 2048
  batch_size: 32
  num_workers: 24
  pin_memory: True
  
  # Sequence dataset configuration
  sequence_config:
    seed: 42

# Training configuration
training:
  num_epochs: 150
  
  # Optimizer settings
  optimizer:
    type: "adamw"
    motion_lr: 1.0e-4
    text_lr: 1.0e-5
    head_lr: 1.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"
    eta_min: 1.0e-6
  
  # Loss function
  loss:
    type: "clip_contrastive"  # "siglip" , "clip_contrastive"
    logit_scale: 0.07  # Temperature parameter
    # logit_bias: -10.0  # Bias for SigLIP loss (only used if type is "siglip")
  
  # Validation settings
  validation:
    every_n_epochs: 1
    metric: "loss"
    mode: "min"
    
  # Training optimizations
  mixed_precision: false
  gradient_clipping: 1.0
  accumulate_gradients: 1

# Checkpointing configuration
checkpointing:
  save_best: true
  save_last: true
  save_every_n_epochs: 10
  max_checkpoints: 10

# Logging configuration
logging:
  log_level: "INFO"
  console_level: "INFO"
  file_level: "DEBUG"
  tensorboard_flush_secs: 60

# Output paths
paths:
  output_dir: "output/DynAction4DHuman"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  tensorboard_dir: "tensorboard"

# Resume training (optional)
resume:
  enabled: false
  checkpoint_path: null
  resume_best: false
  resume_last: false
